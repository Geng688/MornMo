<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 书脊（深色） -->
  <rect x="70" y="40" width="20" height="120" rx="3" fill="#2a7f7a"/>
  
  <!-- 封面（使用您指定的#4ecdc4颜色） -->
  <rect x="90" y="40" width="100" height="120" rx="3" fill="#4ecdc4" stroke="#2a7f7a" stroke-width="2"/>
  
  <!-- 书页效果 -->
  <rect x="90" y="40" width="100" height="120" rx="3" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  
  <!-- 装饰线条 -->
  <line x1="95" y1="60" x2="185" y2="60" stroke="#2a7f7a" stroke-width="1" opacity="0.7"/>
  <line x1="95" y1="70" x2="185" y2="70" stroke="#2a7f7a" stroke-width="1" opacity="0.7"/>
  
</svg>