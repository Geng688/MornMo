<svg width="200" height="320" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变与纹理 -->
  <defs>
    <!-- 抽签筒主体渐变（主色#4ecdc4） -->
    <linearGradient id="tubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#3dbbb6" stop-opacity="1" />
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.9" />
    </linearGradient>
    <!-- 签身渐变 -->
    <linearGradient id="stickGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="50%" stop-color="#f5f5f5" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </linearGradient>
    <!-- 筒身纹理 -->
    <pattern id="tubeTexture" width="30" height="30" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="30" y2="30" stroke="#3dbbb6" stroke-width="0.6" stroke-opacity="0.2" />
    </pattern>
    <!-- 底座阴影 -->
    <filter id="baseShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#2d9b96" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- 1. 抽签筒底座 -->
  <ellipse
          cx="100" cy="300" rx="70" ry="15"
          fill="#3dbbb6"
          filter="url(#baseShadow)"
  />
  <ellipse
          cx="100" cy="298" rx="65" ry="12"
          fill="#4ecdc4"
  />

  <!-- 2. 抽签筒主体（带弧度的圆柱） -->
  <!-- 筒身主体 -->
  <path
          d="M60,80 Q100,60 140,80 L135,290 Q100,280 65,290 Z"
          fill="url(#tubeGradient)"
          stroke="#2d9b96"
          stroke-width="1.5"
  />
  <!-- 筒身纹理叠加 -->
  <path
          d="M60,80 Q100,60 140,80 L135,290 Q100,280 65,290 Z"
          fill="url(#tubeTexture)"
          fill-opacity="0.5"
  />
  <!-- 筒口装饰圈 -->
  <ellipse
          cx="100" cy="80" rx="40" ry="10"
          fill="#3dbbb6"
          stroke="#2d9b96"
          stroke-width="1"
  />
  <ellipse
          cx="100" cy="79" rx="38" ry="8"
          fill="#f0fdfb"
  />

  <!-- 3. 内部三条签（错落排列，带“上/中/下”标识） -->
  <!-- 第一条签（左偏，写“上”） -->
  <rect
          x="75" y="120" width="12" height="180"
          rx="6" ry="6"
          fill="#d4af37"
          stroke="#e0e0e0"
          stroke-width="0.5"
          transform="rotate(-5, 81, 120)"
  />


  <!-- 第二条签（居中，写“中”） -->
  <rect
          x="94" y="100" width="12" height="190"
          rx="6" ry="6"
          fill="#d4af37"
          stroke="#e0e0e0"
          stroke-width="0.5"
  />

  <!-- 第三条签（右偏，写“下”） -->
  <rect
          x="113" y="110" width="12" height="185"
          rx="6" ry="6"
          fill="#d4af37"
          stroke="#e0e0e0"
          stroke-width="0.5"
          transform="rotate(5, 119, 110)"
  />

</svg>